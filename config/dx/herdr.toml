onboarding = false

[terminal]
# Login shells on macOS so Homebrew + ~/.zprofile PATH run in new panes
shell_mode = "auto"
new_cwd = "follow"

[session]
resume_agents_on_restore = true

[update]
channel = "stable"

[remote]
manage_ssh_config = true

[keys]
goto = "prefix+g"
open_notification_target = "prefix+o"
focus_agent = "prefix+alt+1..9"
last_pane = "prefix+`"

[ui]
show_agent_labels_on_pane_borders = true
agent_panel_scope = "current"
confirm_close = true
mouse_capture = true
sidebar_width = 32

[ui.toast]
delivery = "system"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true
position = "bottom-center"

[ui.sound]
enabled = true

[ui.sound.agents]
droid = "off"

[theme]
name = "nord"

[[keys.command]]
key = "prefix+alt+c"
type = "pane"
command = "~/.local/bin/herdr-spawn-codex"
description = "start codex"

[[keys.command]]
key = "prefix+alt+k"
type = "pane"
command = "~/.local/bin/herdr-spawn-kimi"
description = "start kimi"

[[keys.command]]
key = "prefix+alt+h"
type = "pane"
command = "~/.local/bin/herdr-spawn-hermes"
description = "start hermes"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "~/.local/bin/herdr-spawn-grok"
description = "start grok (screen-detected)"

[[keys.command]]
key = "prefix+alt+l"
type = "pane"
command = "~/.local/bin/herdr-spawn-claude"
description = "start claude"

[worktrees]
directory = "~/.herdr/worktrees"

[experimental]
pane_history = false

[advanced]
scrollback_limit_bytes = 10000000
