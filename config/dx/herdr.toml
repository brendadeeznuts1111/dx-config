onboarding = false

[terminal]
# default_shell unset → $SHELL (/bin/zsh), then /bin/sh
# shell_mode = "auto" → login shells on macOS (path_helper, Homebrew); non-login elsewhere
# "login" / "non_login" to force; command panes and spawn keys keep their own paths
shell_mode = "auto"
# "follow" inherits source pane/workspace; "home" / "current" / fixed path also valid
new_cwd = "follow"

[session]
resume_agents_on_restore = true

[update]
channel = "preview"

[remote]
# herdr --remote: temp SSH config with keepalive fallback; user ~/.ssh/config wins
manage_ssh_config = true

[keys]
goto = "prefix+g"
open_notification_target = "prefix+o"
focus_agent = "prefix+alt+1..9"
last_pane = "prefix+`"

[ui]
show_agent_labels_on_pane_borders = true
# all = agents from every workspace in sidebar (multi-repo days). Use "current" for focused workspace only.
agent_panel_scope = "current"
confirm_close = true
mouse_capture = true
sidebar_width = 32

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true
position = "bottom-center"

[ui.sound]
enabled = true

[ui.sound.agents]
droid = "off"

[theme]
name = "solarized"

[[keys.command]]
key = "prefix+alt+c"
type = "pane"
command = "~/.local/bin/herdr-spawn-codex"
description = "start codex"

[[keys.command]]
key = "prefix+alt+k"
type = "pane"
command = "~/.local/bin/herdr-spawn-kimi"
description = "start kimi"

[[keys.command]]
key = "prefix+alt+h"
type = "pane"
command = "~/.local/bin/herdr-spawn-hermes"
description = "start hermes"

[[keys.command]]
key = "prefix+alt+g"
type = "pane"
command = "~/.local/bin/herdr-spawn-grok"
description = "start grok (screen-detected)"

[[keys.command]]
key = "prefix+alt+l"
type = "pane"
command = "~/.local/bin/herdr-spawn-claude"
description = "start claude"

[worktrees]
# default upstream: ~/.herdr/worktrees — sibling-style for ~/Projects/herdr-worktrees/<repo>/<branch>
directory = "~/Projects/herdr-worktrees"

[experimental]
# off by default — pane output can contain secrets; see herdr.dev/docs/session-state/
pane_history = false

[advanced]
scrollback_limit_bytes = 10000000
