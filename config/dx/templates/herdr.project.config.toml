# Config/dotfiles repo profile — copy to .dx/herdr.toml
# Reference: dx-config .dx/herdr.toml. No finish-work (not a Bun toolchain project).
# Flat files use [[tabs]]; nested dx.config.toml profiles use [[herdr.tabs]].
schemaVersion = 1
enabled = true
workspaceLabel = "my-config-repo"
primaryAgent = "grok"
secondaryAgents = ["claude"]
shellPane = true
shellSplit = "right"
bootstrap = [
  "herdr-doctor",
  "git status -sb",
  "herdr-quickref",
  "dx context 2>/dev/null || true",
]

[[tabs]]
label = "doctor"
command = "herdr-doctor 2>/dev/null || true"

[[tabs]]
label = "shell"
command = "git status -sb; herdr-quickref"