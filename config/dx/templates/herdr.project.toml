# Project Herdr profile — copy to .dx/herdr.toml or add [herdr] to dx.config.toml
schemaVersion = 1
enabled = true
workspaceLabel = "my-project"
primaryAgent = "kimi"
secondaryAgents = ["codex"]
shellPane = true
shellSplit = "right"
bootstrap = [
  "dx config --project .",
  "git status -sb",
  "herdr-quickref",
]

# Optional named session (empty = default)
# session = "work"

# Optional extra tabs with shell commands
[[herdr.tabs]]
label = "shell"
command = "herdr-quickref"