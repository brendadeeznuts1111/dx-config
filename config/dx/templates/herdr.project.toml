# Project Herdr profile — copy to .dx/herdr.toml or add [herdr] to dx.config.toml
schemaVersion = 1
enabled = true
workspaceLabel = "my-project"
primaryAgent = "kimi"
secondaryAgents = ["codex"]
shellPane = true
shellSplit = "right"
bootstrap = [
  "dx config --project .",
  "echo 'Finish work: bun run finish-work --message \"...\"'",
  "bun run check:fast && echo '✅ Ready to commit'",
]

# Optional named session (empty = default)
# session = "work"

# Mirror dx/workspace.toml tabs — see kimi-toolchain dx/workspace.toml
[[herdr.tabs]]
label = "doctor"
command = "kimi-doctor --quick 2>/dev/null || true"

[[herdr.tabs]]
label = "shell"
command = "git status -sb; herdr-quickref"